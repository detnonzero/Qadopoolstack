<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Qado Pool Register</title>
  <link rel="stylesheet" href="/app.css?v=20260405a">
</head>
<body data-page="register">
  <div class="backdrop"></div>
  <main class="shell auth-shell">
    <section class="hero">
      <h1>Qado Pool:</h1>
    </section>

    <p id="notice" class="notice page-notice hidden" aria-live="polite"></p>

    <section class="auth-stage">
      <article class="card auth-card">
        <h2>Create account</h2>
        <form id="registerForm">
          <label>Username<input name="username" required></label>
          <label>Password<input name="password" type="password" required></label>
          <label>Repeat password<input name="passwordConfirm" type="password" required></label>
          <button type="submit">Create account</button>
        </form>
        <p id="registerInactiveHint" class="auth-state-hint hidden">
          Account creation is currently inactive.
        </p>
        <p class="auth-link-row">
          <a href="/">Back to login</a>
        </p>
      </article>
    </section>
  </main>

  <script src="/app.js?v=20260405a" defer></script>
</body>
</html>
